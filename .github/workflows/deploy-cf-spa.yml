name: Reusable — deploy CF/S3 SPA

# Builds a static SPA from the calling repo, populates .env from Vault
# (via vault-env action), syncs to S3, invalidates CloudFront.

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      site_url:
        type: string
        required: true

      # AWS
      aws_role_arn:
        type: string
        required: true
      aws_region:
        type: string
        required: false
        default: us-east-1
      s3_bucket:
        type: string
        required: true
      cloudfront_distribution_id:
        type: string
        required: true

      # Vault
      vault_url:
        type: string
        required: true
      vault_auth_method:
        type: string
        required: false
        default: jwt
      vault_role:
        type: string
        required: false
        default: ''
      vault_audience:
        type: string
        required: false
        default: https://github.com/Dev-Better-Inc

      # Vault env source — pass either template_file OR vault_path.
      template_file:
        type: string
        required: false
        default: ''
      vault_path:
        type: string
        required: false
        default: ''

      # Build
      build_command:
        type: string
        required: false
        default: npm run build
      build_output_dir:
        type: string
        required: false
        default: build
      node_version:
        type: string
        required: false
        default: lts/*
      package_manager:
        type: string
        required: false
        default: npm
        description: npm | pnpm

      # Pin the infrastructure repo ref used to load the vault-env action.
      infrastructure_ref:
        type: string
        required: false
        default: main

    secrets:
      vault_username:
        required: false
      vault_password:
        required: false
      vault_token:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Dev-Better-Inc/infrastructure
          ref: ${{ inputs.infrastructure_ref }}
          path: .infrastructure

      - if: inputs.package_manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Install
        run: |
          if [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Resolve .env from Vault
        uses: ./.infrastructure/actions/vault-env
        with:
          vault_url: ${{ inputs.vault_url }}
          auth_method: ${{ inputs.vault_auth_method }}
          vault_role: ${{ inputs.vault_role }}
          vault_audience: ${{ inputs.vault_audience }}
          vault_username: ${{ secrets.vault_username }}
          vault_password: ${{ secrets.vault_password }}
          vault_token: ${{ secrets.vault_token }}
          template_file: ${{ inputs.template_file }}
          vault_path: ${{ inputs.vault_path }}

      - name: Build
        run: ${{ inputs.build_command }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sync hashed assets (immutable)
        run: |
          aws s3 sync ${{ inputs.build_output_dir }}/ s3://${{ inputs.s3_bucket }}/ \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML (no cache)
        run: |
          aws s3 sync ${{ inputs.build_output_dir }}/ s3://${{ inputs.s3_bucket }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.cloudfront_distribution_id }} \
            --paths "/*"

      - run: echo "Deployed ${{ inputs.environment }} → ${{ inputs.site_url }}" >> $GITHUB_STEP_SUMMARY
